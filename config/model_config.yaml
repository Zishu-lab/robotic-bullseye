# 模型配置文件
# 所有模型路径和相关参数的统一配置

models:
  # YOLO 目标检测模型
  yolo:
    path: "runs/detect/runs/detect/bullseye_train/weights/best.pt"
    confidence_threshold: 0.3

  # CIFAR-100 分类模型
  classifier:
    # 优先使用 EfficientNet-B3 (80.18%)
    path: "experiments/runs/cifar100_optimized/best.pt"
    fallback_path: "models/classifier/final_classifier.pt"

# 设备配置
device:
  type: "auto"  # auto, cuda, cpu
  gpu_id: 0

# 摄像头配置
camera:
  default_url: "http://10.24.100.139:8080/video"
  timeout: 10
  fps_target: 30

# 推理配置
inference:
  batch_size: 1
  use_half_precision: false  # FP16 推理（需要 GPU 支持）
